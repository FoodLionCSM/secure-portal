  <input type= "password" id="passwordInput" placeholder= "enter your key...">
  <button onclick="checkPassword()">Unlock Content </button>
  <div id= "content"></div>
</div>

<script>
   
  const SUPABASE_URL = "https://prgpcqcqkfyrkwygtqrv.supabase.co";
  const SUPABASE_ANON_Key = "sb_publishable_Fd-Dvau9CbQsZK-XF85GLA_WEcQLp_k";

  const supabase = lib.supabase.createClient(https://prgpcqcqkfyrkwygtqrv.supabase.co, sb_publishable_Fd-Dvau9CbQsZK-XF85GLA_WEcQLp_k);

  async function checkPassword() {
    const userInput = document.getElementById('passwordInput').value;
    const contentDiv = document.getElementbyId('content');
    contentDiv.innerText = "Checking...";

    // Securely query the database for a matching password row 
    const { data, error } = await supabase
    .from('secret_content')
    .select('hidden_info')
    .eq('password_key', userInput)
    .single();

    if (error || !data) {
      contentDiv.style.color = "red";
      contentDiv.innerText = "invalid password. Access denied.";
    } else {
      contentDiv.style.color = "green";
      //Display the dynamically located information
      contentDiv.innerHTML = data.hidden_info;
    }
  }
  :/script>
